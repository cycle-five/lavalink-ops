<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lavalink Ops</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center font-sans">
    
    <div class="max-w-md w-full bg-gray-800 rounded-lg shadow-lg border border-gray-700 p-8">
        <div class="text-center mb-8">
            <svg class="h-12 w-12 text-[#F54E4E] mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
            <h2 class="text-2xl font-bold text-white">Lavalink Ops</h2>
            <p class="text-gray-400 text-sm mt-1">Sign in to manage node</p>
        </div>

        {% if error %}
        <div class="bg-red-900/50 border border-red-500 text-red-200 px-4 py-3 rounded mb-6 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form action="/do-login" method="POST" class="space-y-6">
            <div>
                <label for="password" class="block text-sm font-medium text-gray-300">Admin Password</label>
                <input type="password" id="password" name="password" required autofocus
                       class="mt-1 block w-full bg-gray-900 border border-gray-600 rounded-md shadow-sm py-2 px-3 text-white focus:outline-none focus:ring-2 focus:ring-[#F54E4E] focus:border-[#F54E4E]">
            </div>
            
            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-[#F54E4E] hover:bg-red-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 focus:ring-[#F54E4E]">
                Sign in
            </button>
        </form>
    </div>

</body>
</html>
