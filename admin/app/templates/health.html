{% extends "base.html" %}

{% block title %}Health Check - Lavalink Ops{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-3xl font-bold text-white">Service Health</h1>
    <p class="text-gray-400 mt-1">Live status of the Lavalink stack components.</p>
</div>

<!-- HTMX polling container -->
<div hx-get="/health" 
     hx-trigger="every 10s" 
     hx-swap="innerHTML"
     hx-target="this">
    {% include "partials/health_cards.html" %}
</div>
{% endblock %}
