{% extends "base.html" %}

{% block title %}Dashboard - Lavalink Ops{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-3xl font-bold text-white">Dashboard</h1>
    <p class="text-gray-400 mt-1">Real-time statistics from the Lavalink node.</p>
</div>

<!-- HTMX polling container -->
<div hx-get="/" 
     hx-trigger="every 5s" 
     hx-swap="innerHTML"
     hx-target="this">
    {% include "partials/dashboard_stats.html" %}
</div>
{% endblock %}
