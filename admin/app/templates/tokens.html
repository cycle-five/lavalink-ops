{% extends "base.html" %}

{% block title %}Tokens & Auth - Lavalink Ops{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-3xl font-bold text-white">Tokens & Authentication</h1>
    <p class="text-gray-400 mt-1">Manage YouTube PoTokens and OAuth rotation flow.</p>
</div>

<!-- Container for Toast Messages triggered manually -->
<div id="pot-status" class="mb-4"></div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    <div hx-get="/tokens" 
         hx-trigger="every 5s" 
         hx-swap="innerHTML"
         hx-target="#tokens-content">
        <div id="tokens-content">
            {% include "partials/tokens_content.html" %}
        </div>
    </div>
</div>
{% endblock %}
