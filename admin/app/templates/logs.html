{% extends "base.html" %}

{% block title %}Logs - Lavalink Ops{% endblock %}

{% block content %}
<div class="mb-6 flex justify-between items-end">
    <div>
        <h1 class="text-3xl font-bold text-white">Log Viewer</h1>
        <p class="text-gray-400 mt-1">Live streaming logs from the Lavalink container.</p>
    </div>
    
    <div class="flex items-center space-x-2" x-data="logViewer()">
        <select x-model="filterType" @change="updateLogs()"
                class="bg-gray-800 text-sm text-gray-200 border border-gray-700 rounded-md py-1.5 px-3 focus:outline-none focus:ring-1 focus:ring-lavalink">
            <option value="all">All Logs</option>
            <option value="errors">Errors / Warnings</option>
            <option value="youtube">YouTube Only</option>
            <option value="oauth">OAuth Only</option>
        </select>
        
        <select x-model="tail" @change="updateLogs()"
                class="bg-gray-800 text-sm text-gray-200 border border-gray-700 rounded-md py-1.5 px-3 focus:outline-none focus:ring-1 focus:ring-lavalink">
            <option value="50">Tail: 50</option>
            <option value="100">Tail: 100</option>
            <option value="500">Tail: 500</option>
        </select>
        
        <button @click="autoScroll = !autoScroll"
                :class="autoScroll ? 'bg-blue-600 border-blue-600' : 'bg-gray-800 border-gray-700'"
                class="border text-sm text-white px-3 py-1.5 rounded transition shadow-sm font-medium">
            <span x-text="autoScroll ? 'Auto-scroll On' : 'Auto-scroll Off'"></span>
        </button>
    </div>
</div>

<div class="bg-[#1e1e1e] shadow rounded-lg border border-gray-700 font-mono text-sm leading-relaxed text-gray-300 h-[600px] overflow-y-auto w-full p-4 whitespace-pre-wrap flex flex-col pt-16 relative"
     id="log-container" x-data="logViewer()">
     
    <!-- HTMX polling injects content here -->
    <div id="log-lines"
         class="h-full w-full relative"
         hx-get="/logs/stream" 
         hx-trigger="every 2s" 
         hx-vals='js:{filter_type: getFilter(), tail: getTail()}'
         hx-swap="innerHTML">
         
        {% include "partials/log_lines.html" %}
        
    </div>
</div>

<script>
    // Alpine component to manage logs state
    document.addEventListener('alpine:init', () => {
        Alpine.data('logViewer', () => ({
            filterType: 'all',
            tail: '100',
            autoScroll: true,
            
            init() {
                // Attach the Alpine state to the window so HTMX has access to it via `js:` vals
                window.getFilter = () => this.filterType;
                window.getTail = () => this.tail;
                
                // HTMX afterSwap hook
                document.body.addEventListener('htmx:afterSwap', (evt) => {
                    if (evt.detail.target.id === 'log-lines' && this.autoScroll) {
                        const container = document.getElementById('log-container');
                        container.scrollTop = container.scrollHeight;
                    }
                });
            },
            
            updateLogs() {
                // Instantly fetch new logs using HTMX
                htmx.trigger('#log-lines', 'htmx:trigger');
            }
        }))
    });
</script>
{% endblock %}
