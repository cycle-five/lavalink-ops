<div class="bg-green-900/50 border border-green-500 rounded p-4 flex items-center justify-between" x-data="{ show: true }" x-show="show" x-transition.opacity>
    <div class="flex items-center">
        <svg class="h-5 w-5 text-green-400 mr-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
        </svg>
        <span class="text-green-100 font-medium text-sm">{{ message|default("Saved Successfully!") }}</span>
    </div>
    
    <!-- Alpine dispatcher for global toast just in case -->
    <div x-init="$dispatch('notify', { msg: '{{ message|default("Saved Successfully!") }}', error: false })" class="hidden"></div>
</div>
