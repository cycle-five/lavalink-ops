<div class="bg-red-900/50 border border-red-500 rounded p-4 flex items-start" x-data="{ show: true }" x-show="show" x-transition.opacity>
    <svg class="h-5 w-5 text-red-400 mr-3 mt-0.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
    </svg>
    <div>
        <h3 class="text-sm font-medium text-red-200">Save Failed</h3>
        <p class="text-red-300 text-sm mt-1 whitespace-pre-wrap">{{ error|default("An unknown error occurred.") }}</p>
    </div>
    
    <!-- Alpine dispatcher for global toast just in case -->
    <div x-init="$dispatch('notify', { msg: 'Save failed!', error: true })" class="hidden"></div>
</div>
